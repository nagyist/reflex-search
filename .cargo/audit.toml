# cargo-audit configuration (https://github.com/rustsec/rustsec/tree/main/cargo-audit)
#
# The CI "Security audit" step runs `cargo audit`, which fails the build on any
# advisory that is not listed here.

[advisories]
ignore = [
    # ---------------------------------------------------------------------------
    # quick-xml 0.39.x DoS advisories — transitive, no upstream fix available.
    #
    #   quick-xml 0.39.4  <-  plist 1.9.0 (pins quick-xml ^0.39.2, i.e. <0.40)
    #                     <-  syntect 5.x (theme/`.tmTheme` plist loading)
    #                     <-  reflex-search
    #
    # Both advisories are denial-of-service issues (quadratic parse time /
    # unbounded allocation) that require feeding UNTRUSTED XML to quick-xml.
    # In Reflex, quick-xml is only reached when syntect parses `.tmTheme`
    # syntax-highlighting themes — bundled defaults or the user's own local
    # theme files, never attacker-controlled or network input. Reflex is a
    # local-first, single-user tool, so this path is not exploitable in our
    # threat model.
    #
    # The fix (quick-xml >=0.41.0) cannot be pulled in yet: plist 1.9.0 is the
    # latest release and still requires quick-xml ^0.39.2. Remove these entries
    # once plist (or syntect) ships a release that depends on quick-xml >=0.41.
    "RUSTSEC-2026-0194", # quick-xml: quadratic runtime on duplicate attribute names
    "RUSTSEC-2026-0195", # quick-xml: unbounded namespace-declaration allocation (NsReader)
]
