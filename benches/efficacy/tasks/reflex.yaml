# Efficacy task corpus — Reflex repository (thin-slice backbone).
# Repo pin: reflex @ d2935f48f5abea2a76b479040a23478155be9bb0 (see ../repos.md).
# Schema: ./SCHEMA.md. Ground truth cross-checked by ripgrep + manual inspection
# (+ tree-sitter for definitions) — never by Reflex, to avoid circularity.
#
# expect_reflex is pre-declared BEFORE any trial (no cherry-picking):
#   - find_all_usages / locate are `neutral`: ripgrep is already complete-coverage
#     and token-lean (Phase 0 showed Grep cheaper than Reflex on extract_symbols).
#     find_all_usages is also the PRE-REGISTERED PRIMARY endpoint.
#   - `win` only where a purpose-built Reflex tool plausibly beats grep.
#   - `lose` for the trivial literal-grep control.

tasks:
  # ── Category 1: locate_definition ───────────────────────────────────────────
  - id: reflex-locate-trigramindex
    repo: reflex
    repo_sha: d2935f48f5abea2a76b479040a23478155be9bb0
    category: locate_definition
    expect_reflex: neutral
    prompt: >-
      In the Reflex repository, where is the `TrigramIndex` struct defined?
      Give the exact file path and line number.
    ground_truth:
      type: location
      file: src/trigram.rs
      line: 184
      expect_regex: '^pub struct TrigramIndex \{'
    oracle_notes: >-
      Cross-checked: (1) `rg -nw 'struct TrigramIndex' src` returns exactly one
      hit (src/trigram.rs:184) — unique definition; (2) manually read the line,
      confirmed it is the struct definition, not a usage or impl header.

  - id: reflex-locate-queryengine
    repo: reflex
    repo_sha: d2935f48f5abea2a76b479040a23478155be9bb0
    category: locate_definition
    expect_reflex: neutral
    prompt: >-
      In the Reflex repository, where is the `QueryEngine` struct defined?
      Give the exact file path and line number.
    ground_truth:
      type: location
      file: src/query/mod.rs
      line: 26
      expect_regex: '^pub struct QueryEngine \{'
    oracle_notes: >-
      Cross-checked: (1) `rg -nw 'struct QueryEngine' src` returns exactly one
      hit (src/query/mod.rs:26); (2) manual read confirms the definition line.

  # ── Category 2: find_all_usages (PRE-REGISTERED PRIMARY) ────────────────────
  - id: reflex-findall-extract_symbols
    repo: reflex
    repo_sha: d2935f48f5abea2a76b479040a23478155be9bb0
    category: find_all_usages
    expect_reflex: neutral
    prompt: >-
      Find every occurrence of the identifier `extract_symbols` in the Reflex
      codebase (the `src/` tree). List each as file:line.
    ground_truth:
      type: match_set
      oracle: { pattern: 'extract_symbols', path: 'src', flags: ['-w'] }
      expected_count: 122
      expected_sha256: '91ad6e25a34481fd832eb4129128889bda187529a00917661af8de7ed0e6a1e4'
    oracle_notes: >-
      This is the Phase 0 canonical thin-slice task and the pre-registered
      primary endpoint. Cross-checked: (1) oracle.py match_set (word-boundary)
      count=122; (2) `rg -nw 'fn extract_symbols' src/parsers` confirms 15 of
      those are the per-language definitions; the remaining 107 are call sites /
      references, spot-checked manually across parsers/mod.rs and symbol_cache.rs.

  - id: reflex-findall-symbolcache
    repo: reflex
    repo_sha: d2935f48f5abea2a76b479040a23478155be9bb0
    category: find_all_usages
    expect_reflex: neutral
    prompt: >-
      Find every occurrence of the identifier `SymbolCache` in the Reflex `src/`
      tree. List each as file:line.
    ground_truth:
      type: match_set
      oracle: { pattern: 'SymbolCache', path: 'src', flags: ['-w'] }
      expected_count: 12
      expected_sha256: 'f322707505884c2083e89e1188d8471196bf9d41e31adb77d7aa160d5b0554ee'
    oracle_notes: >-
      Cross-checked: (1) oracle.py match_set count=12; (2) per-file `rg -cw
      SymbolCache src` tally sums to 12; the sole definition is
      src/symbol_cache.rs:18 (`pub struct SymbolCache`), remainder are usages.

  - id: reflex-findall-trigramindex
    repo: reflex
    repo_sha: d2935f48f5abea2a76b479040a23478155be9bb0
    category: find_all_usages
    expect_reflex: neutral
    prompt: >-
      Find every occurrence of the identifier `TrigramIndex` in the Reflex `src/`
      tree. List each as file:line.
    ground_truth:
      type: match_set
      oracle: { pattern: 'TrigramIndex', path: 'src', flags: ['-w'] }
      expected_count: 21
      expected_sha256: '6b7ac72ceb5bb11c5c078667ed01c54769a3e1fcd15abe62cefc2510bdcbc113'
