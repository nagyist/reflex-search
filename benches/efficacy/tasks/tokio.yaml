  # ── Category 7: comprehension (rubric-graded) ───────────────────────────────
  - id: tokio-comprehension-coop-budget
    repo: tokio
    repo_sha: ab3ff69cf2258a8c696b2dca89a2cef4ff114c1c
    category: comprehension
    expect_reflex: win
    prompt: >-
      How does tokio's cooperative scheduling (the per-task budget that forces
      long-running futures to yield) work? Point to the mechanism and the code.
    ground_truth:
      type: rubric
      expected_files:
        - tokio/src/task/coop/mod.rs
        - tokio/src/runtime/context.rs
      required_facts:
        - "Each task is assigned a per-poll operation budget when it starts running; the initial budget is 128 operations (`Budget::initial()` returns `Budget(Some(128))` in tokio/src/task/coop/mod.rs)."
        - "The budget is represented by `struct Budget(Option<u8>)`, where `None` (via `Budget::unconstrained()`) means the task is exempt from cooperative-scheduling limits."
        - "The budget is stored in a thread-local `Cell<coop::Budget>` accessed through `context::budget(...)` in tokio/src/runtime/context.rs, not passed explicitly."
        - "Resource operations call `coop::poll_proceed(cx)`, which decrements the current budget; when the budget is exhausted it registers the waker and returns `Poll::Pending`, forcing the task to yield back to the executor instead of starving others."
        - "`poll_proceed` returns a `RestoreOnPending` guard: if the future makes no progress the budget is restored on drop, and the caller must call `RestoreOnPending::made_progress()` so the budget actually empties over repeated polls."
        - "A future can opt out with `task::unconstrained` / `coop::with_unconstrained`, which runs it with `Budget::unconstrained()` so it is never forced to yield."
    oracle_notes: >-
      Rubric task (Phase-5 LLM-judge graded, not machine-scored). Verified
      expected_files exist and contain the mechanism: tokio/src/task/coop/mod.rs
      defines `struct Budget(Option<u8>)` (~line 97), `Budget::initial()` →
      `Budget(Some(128))` (~115-116), `unconstrained()` (~120), `poll_proceed`
      with decrement + `register_waker` + `Poll::Pending` (~291-311), and the
      `RestoreOnPending` guard (~257-289). runtime/context.rs holds the
      thread-local `Cell<coop::Budget>` and the `budget(...)` accessor. Cross-check
      via `rg -n 'Budget|poll_proceed|unconstrained' tokio/src/task/coop/mod.rs`
      and `rg -n 'coop::Budget' tokio/src/runtime/context.rs`. expect_reflex=win:
      gather_context assembles this in one call vs many Read/Grep round-trips.

